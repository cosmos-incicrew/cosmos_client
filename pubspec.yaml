name: cosmos_app
description: "cosmos - 화장품 성분 기반 추천 앱"
publish_to: "none"
version: 0.1.0+1

environment:
  # withValues(alpha:) 등 최신 API 사용 → Flutter 3.27+ / Dart 3.6+ 필요.
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 상태관리
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 라우팅
  go_router: ^14.2.0

  # 네트워킹 / 백엔드
  supabase_flutter: ^2.5.6
  dio: ^5.4.3+1

  # 이미지 로딩
  cached_network_image: ^3.3.1

  # 로컬 저장소
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2

  # 로그인
  # 구글만 네이티브 SDK가 필요하다 — ID 토큰을 받아 Supabase 로 넘긴다.
  # 카카오는 Supabase 웹 OAuth(딥링크 복귀)로 처리하므로 SDK 를 안 쓴다.
  google_sign_in: ^7.2.0
  # 네이버·애플은 v1 제외 (2026-07-07 결정)

  # 유틸
  cupertino_icons: ^1.0.6
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # 코드 생성 (Riverpod / Hive)
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

  # 앱 런처 아이콘 생성 — assets/icons/app/app_icon.png 를 넣고
  # `dart run flutter_launcher_icons` 실행 (아래 flutter_launcher_icons 섹션)
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    # 이미지 (PNG) — 용도별 분리. 폴더 구조는 assets/README.md 참고.
    - assets/images/logo/
    - assets/images/onboarding/
    - assets/images/profile/    # 성별 선택 고양이 (female.png / male.png)
    - assets/images/bsti/
    - assets/images/bsti/cat/      # 유형별 고양이 캐릭터 (파일명: OSPW.png … DRNT.png)
    - assets/images/bsti/label/    # 유형별 영문 코드 라벨 (파일명: OSPW.png … DRNT.png)
    - assets/images/bsti/icon/     # 권장/주의 성분 아이콘 (recommend.png / avoid.png)
    - assets/images/home/
    - assets/images/report/   # 보고서 로딩 GIF
    - assets/images/product/   # 제품 이미지 (목데이터용, 파일명: p1.png … p6.png)
    - assets/images/common/
    # 아이콘 (PNG)
    - assets/icons/social/
    - assets/icons/nav/
    - assets/icons/common/
    - assets/icons/footer/  # 하단바 아이콘 (README 참고)
  # 폰트: 본문 Pretendard + 포인트 갈무리 9/11.
  # 파일을 assets/fonts/ 에 넣기 전엔 flutter가 경고만 내고 시스템 폰트로 대체된다.
  # 파일 넣은 뒤 아래 경로가 실제 파일명과 맞는지만 확인. 자세한 건 assets/fonts/README.md.
  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.ttf
        - asset: assets/fonts/Pretendard-Medium.ttf
          weight: 500
        - asset: assets/fonts/Pretendard-Bold.ttf
          weight: 700
    - family: Galmuri9
      fonts:
        - asset: assets/fonts/Galmuri9.ttf
    - family: Galmuri11
      fonts:
        - asset: assets/fonts/Galmuri11.ttf
        - asset: assets/fonts/Galmuri11-Bold.ttf
          weight: 700

# 앱 런처 아이콘 (홈 화면 아이콘) 설정.
# 1) assets/icons/app/app_icon.png 에 1024x1024 PNG 를 넣는다
# 2) dart run flutter_launcher_icons   ← 플랫폼별 아이콘 자동 생성
flutter_launcher_icons:
  image_path: "assets/icons/app/app_icon.png"
  android: true
  ios: false # iOS 폴더가 없는 안드로이드 전용 프로젝트
  web:
    generate: true
  windows:
    generate: true
