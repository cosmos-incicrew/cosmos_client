name: cosmos_app
description: "cosmos - 화장품 성분 기반 추천 앱"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 상태관리
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # 라우팅
  go_router: ^14.2.0

  # 네트워킹 / 백엔드
  supabase_flutter: ^2.5.6
  dio: ^5.4.3+1

  # 이미지 로딩
  cached_network_image: ^3.3.1

  # 로컬 저장소
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.2

  # 로그인 (게스트 외 소셜은 후속 연동 — 주석 참고)
  # kakao_flutter_sdk_user: ^1.9.5
  # google_sign_in: ^6.2.1
  # sign_in_with_apple: ^6.1.1

  # 유틸
  cupertino_icons: ^1.0.6
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # 코드 생성 (Riverpod / Hive)
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  # 커스텀 폰트를 쓸 경우 여기에 추가
  # fonts:
  #   - family: Pretendard
  #     fonts:
  #       - asset: assets/fonts/Pretendard-Regular.otf
  #       - asset: assets/fonts/Pretendard-Bold.otf
  #         weight: 700
